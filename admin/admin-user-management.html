<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>공공기관 사용자 관리 - 영주 빈집 플랫폼</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../common/common.css">
  <link rel="stylesheet" href="admin.css?v=11">
  <link rel="stylesheet" href="admin-user-management.css">
</head>
<body class="admin-body">
  <div id="headerPlaceholder"></div>

  <div class="admin-layout">
    <aside class="admin-sidebar" id="adminSidebar">
      <div class="admin-sidebar__header">
        <div class="admin-sidebar__logo">YJ</div>
        <div>
          <div class="admin-sidebar__title">영주시 관리자</div>
          <div class="admin-sidebar__subtitle">공공기관 운영 콘솔</div>
        </div>
      </div>
      <nav class="admin-nav">
        <div class="admin-nav__group-label">운영 현황</div>
        <a href="admin-dashboard.html" class="admin-nav__item">
          <span class="admin-nav__icon">01</span>
          <span>대시보드</span>
        </a>
        <div class="admin-nav__group-label">빈집 관리</div>
        <a href="admin-review-list.html" class="admin-nav__item">
          <span class="admin-nav__icon">02</span>
          <span>신청 검토 목록</span>
          <span class="admin-nav__badge" id="pendingCountBadge" hidden>0</span>
        </a>
        <a href="admin-district.html" class="admin-nav__item">
          <span class="admin-nav__icon">03</span>
          <span>지역별 현황</span>
        </a>
        <a href="admin-analytics.html" class="admin-nav__item">
          <span class="admin-nav__icon">04</span>
          <span>빈집 분석</span>
        </a>
        <div class="admin-nav__group-label">연계 관리</div>
        <a href="../vendor/vendor-list.html" class="admin-nav__item">
          <span class="admin-nav__icon">05</span>
          <span>협력업체 관리</span>
        </a>
      </nav>
    </aside>

    <main class="admin-main" id="adminUserManagementMain">
      <div class="admin-main__header">
        <div>
          <h1 class="admin-main__title">공공기관 사용자 관리</h1>
          <p class="admin-user-management__subtitle">가입 승인과 reviewer / approver / super_admin 권한을 관리합니다.</p>
        </div>
        <button type="button" class="btn btn--ghost btn--sm" id="adminUserRefreshBtn">새로고침</button>
      </div>

      <section class="admin-user-summary-grid" id="adminUserSummaryGrid" aria-label="공공기관 사용자 요약"></section>

      <section class="admin-panel" style="margin-bottom: var(--spacing-xl);">
        <div class="admin-panel__header">
          <h2 class="admin-panel__title">
            승인 대기 계정
            <span id="pendingAdminUsersCount" class="admin-user-management__count"></span>
          </h2>
        </div>
        <div id="pendingAdminUsersTable"></div>
      </section>

      <section class="admin-panel">
        <div class="admin-panel__header">
          <h2 class="admin-panel__title">
            활성 공공기관 계정
            <span id="activeAdminUsersCount" class="admin-user-management__count"></span>
          </h2>
        </div>
        <div id="activeAdminUsersTable"></div>
      </section>
    </main>
  </div>

  <div id="footerPlaceholder"></div>

  <script src="../common/common.js?v=13"></script>
  <script src="../common/header.js"></script>
  <script src="../common/footer.js"></script>
  <script src="admin-user-management.js?v=4"></script>
</body>
</html>
