<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>지역별 현황 - 영주 빈집 플랫폼</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../common/common.css">
  <link rel="stylesheet" href="admin.css?v=11">
  <link rel="stylesheet" href="admin-district.css">
</head>
<body class="admin-body">
  <div id="headerPlaceholder"></div>

  <div class="admin-layout">
    <aside class="admin-sidebar">
      <div class="admin-sidebar__header">
        <div class="admin-sidebar__logo">YJ</div>
        <div>
          <div class="admin-sidebar__title">영주시 관리자</div>
          <div class="admin-sidebar__subtitle">공공기관 운영 콘솔</div>
        </div>
      </div>
      <nav class="admin-nav">
        <div class="admin-nav__group-label">운영 현황</div>
        <a href="admin-dashboard.html" class="admin-nav__item">
          <span class="admin-nav__icon">01</span>
          <span>대시보드</span>
        </a>
        <div class="admin-nav__group-label">빈집 관리</div>
        <a href="admin-review-list.html" class="admin-nav__item">
          <span class="admin-nav__icon">02</span>
          <span>신청 검토 목록</span>
          <span class="admin-nav__badge" id="pendingCountBadge" hidden>0</span>
        </a>
        <a href="admin-district.html" class="admin-nav__item is-active">
          <span class="admin-nav__icon">03</span>
          <span>지역별 현황</span>
        </a>
        <a href="admin-analytics.html" class="admin-nav__item">
          <span class="admin-nav__icon">04</span>
          <span>빈집 분석</span>
        </a>
        <div class="admin-nav__group-label">연계 관리</div>
        <a href="../vendor/vendor-list.html" class="admin-nav__item">
          <span class="admin-nav__icon">05</span>
          <span>협력업체 관리</span>
        </a>
      </nav>
    </aside>

    <main class="admin-main">
      <div class="admin-main__header">
        <h1 class="admin-main__title">영주시 지역별 현황</h1>
        <div style="font-size:var(--font-size-xs);color:var(--color-text-muted);">
          읍면동을 클릭하면 해당 지역의 신청 및 승인 현황을 확인할 수 있습니다.
        </div>
      </div>

      <div class="district-overview-section">
        <h3 class="district-overview-section__title">영주시 읍면동 현황 지도</h3>
        <p class="district-overview-section__desc">
          각 읍면동 카드를 클릭하면 해당 지역의 상세 신청 현황을 drill-down 형태로 볼 수 있습니다.
        </p>
        <div class="district-grid" id="districtOverviewGrid"></div>
      </div>

      <div class="district-drilldown-section" id="districtDrilldownSection" style="display:none;">
        <div class="district-drilldown-header" id="districtDrilldownHeader"></div>
        <div class="district-drilldown-content">
          <div class="district-kpi-row" id="districtKpiRow"></div>

          <div class="admin-panel">
            <div class="admin-panel__header">
              <h3 class="admin-panel__title" id="districtRequestsTitle">신청 목록</h3>
              <a id="districtFilterLink" href="#" class="btn btn--ghost btn--sm">전체 목록에서 보기</a>
            </div>
            <div id="districtRequestsTable"></div>
          </div>

          <div class="admin-panel" style="margin-top:var(--spacing-lg);">
            <div class="admin-panel__header">
              <h3 class="admin-panel__title">승인된 빈집 목록</h3>
            </div>
            <div id="districtApprovedHouses"></div>
          </div>
        </div>
      </div>

      <div class="admin-panel" style="margin-top:var(--spacing-xl);">
        <div class="admin-panel__header">
          <h3 class="admin-panel__title">전체 지역 통계 비교</h3>
        </div>
        <div id="allDistrictStatsTable"></div>
      </div>
    </main>
  </div>

  <div id="footerPlaceholder"></div>

  <script src="../data/sample-data.js"></script>
  <script src="../common/common.js?v=13"></script>
  <script src="../common/header.js"></script>
  <script src="../common/footer.js"></script>
  <script src="admin-district.js?v=4"></script>
</body>
</html>
