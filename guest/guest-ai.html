<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>AI 빈집 추천 - 영주 빈집 플랫폼</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../common/common.css?v=16">
  <link rel="stylesheet" href="../common/floating-actions.css?v=4">
  <link rel="stylesheet" href="guest-ai.css?v=9">
</head>
<body class="guest-ai-page">
  <div id="headerPlaceholder"></div>

  <section class="guest-ai-hero">
    <div class="guest-ai-hero__inner">
      <p class="guest-ai-hero__eyebrow">영주시 공공데이터 기반 AI 추천</p>
      <h1 class="guest-ai-hero__title">영주시 빈집 활용 조건을 대화형으로 바로 물어보세요</h1>
      <p class="guest-ai-hero__desc">
        원하는 지역, 인원, 체류 기간, 활용 목적을 입력하면 영주시 승인 빈집과 공공데이터 기반 안내를 함께 추천해드립니다.
      </p>
    </div>
  </section>

  <main class="guest-ai-main">
    <div class="guest-ai-shell">
      <section class="guest-ai-chat" id="guestAiChatRoot" aria-label="AI 채팅">
        <header class="guest-ai-chat__header">
          <div>
            <strong class="guest-ai-chat__header-title">AI 채팅</strong>
            <p class="guest-ai-chat__header-desc">무엇이든 물어보세요. 영주시 빈집 추천과 안내를 채팅으로 도와드립니다.</p>
          </div>
          <span class="guest-ai-chat__header-badge">영주시 전용</span>
        </header>

        <div class="guest-ai-chat__messages" data-ai-chat-messages aria-live="polite"></div>

        <div class="guest-ai-chat__composer">
          <label class="guest-ai-chat__input-wrap" for="aiChatInput">
            <textarea
              id="aiChatInput"
              data-ai-chat-input
              class="guest-ai-chat__input"
              rows="1"
              placeholder="원하는 지역, 인원, 일정, 분위기를 입력해 주세요"
            ></textarea>
          </label>
          <button type="button" class="guest-ai-chat__send" data-ai-chat-send>보내기</button>
        </div>
        <p class="guest-ai-chat__status" data-ai-chat-status></p>
      </section>
    </div>
  </main>

  <div id="footerPlaceholder"></div>

  <script src="../data/sample-data.js"></script>
  <script src="../common/common.js?v=17"></script>
  <script src="../common/header.js"></script>
  <script src="../common/ai-chat-core.js?v=1"></script>
  <script src="../common/footer.js"></script>
  <script src="guest-ai.js?v=8"></script>
</body>
</html>
