<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 빈집 추천 - 영주 빈집 플랫폼</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../common/common.css?v=16">
  <link rel="stylesheet" href="guest-ai.css?v=4">
</head>
<body class="guest-ai-page">
  <div id="headerPlaceholder"></div>

  <div class="page-header">
    <div class="page-header__inner">
      <h1 class="page-header__title">✨ AI 빈집 채팅 추천</h1>
    </div>
  </div>

  <main class="ai-main">
    <div class="ai-chat-layout">
      <section class="ai-chat-section" aria-label="AI 추천 대화">
        <header class="ai-chat-section__header">
          <div>
            <h3>AI 추천 도우미와 대화하기</h3>
            <p>원하는 지역, 인원, 분위기를 자유롭게 말씀해 주세요. 영주시 승인 빈집을 대화형으로 추천해드립니다.</p>
          </div>
        </header>

        <div class="ai-chat-messages" id="aiChatMessages" aria-live="polite">
          <div class="ai-chat-msg ai-chat-msg--bot">
            <div class="ai-chat-msg__avatar" aria-hidden="true">
              <img src="../assets/images/yeongju_mas.jpg" alt="영주도령 프로필">
            </div>
            <div class="ai-chat-msg__content">
              <div class="ai-chat-msg__name">AI 추천 도우미</div>
              <div class="ai-chat-msg__bubble">
                안녕하세요. 영주시 공공형 빈집 AI 추천 도우미 '영주도령'입니다.<br>
                찾으시는 조건을 편하게 말씀해 주세요. 예: "풍기읍, 4명, 2박, 조용한 자연 분위기"
              </div>
            </div>
          </div>
        </div>

        <div class="ai-chat-input-area">
          <label class="ai-chat-input" for="aiChatInput">
            <input type="text" id="aiChatInput" placeholder="원하는 지역, 인원, 일정, 분위기를 입력해 주세요">
          </label>
          <button type="button" class="btn btn--primary" id="aiChatSendBtn">보내기</button>
        </div>
      </section>
    </div>
  </main>

  <div id="footerPlaceholder"></div>

  <script src="../data/sample-data.js"></script>
  <script src="../common/common.js?v=17"></script>
  <script src="../common/header.js"></script>
  <script src="../common/footer.js"></script>
  <script src="guest-ai.js"></script>
</body>
</html>
